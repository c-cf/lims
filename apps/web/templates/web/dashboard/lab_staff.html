{% extends "web/base.html" %}
{% block content %}
<div class="mb-6">
  <h1 class="text-xl font-semibold text-slate-900">Dashboard</h1>
  <p class="text-slate-500 text-sm mt-0.5">Welcome back, {{ request.user.username }}</p>
</div>

<div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
  <a href="{% url 'web:samples' %}?status=shipped"
     class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm hover:border-blue-300 hover:shadow transition-all cursor-pointer">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
        </svg>
      </div>
      <p class="text-sm font-medium text-slate-500">To Receive</p>
    </div>
    <p class="text-3xl font-bold text-slate-900">{{ samples_to_receive }}</p>
  </a>
  <a href="{% url 'web:wips' %}"
     class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm hover:border-blue-300 hover:shadow transition-all cursor-pointer">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <p class="text-sm font-medium text-slate-500">Active WIPs</p>
    </div>
    <p class="text-3xl font-bold text-slate-900">{{ active_wips }}</p>
  </a>
  <a href="{% url 'web:dispatches' %}"
     class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm hover:border-teal-300 hover:shadow transition-all cursor-pointer">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-8 h-8 bg-teal-50 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
        </svg>
      </div>
      <p class="text-sm font-medium text-slate-500">Active Dispatches</p>
    </div>
    <p class="text-3xl font-bold text-slate-900">{{ pending_dispatches }}</p>
  </a>
  <a href="{% url 'web:dispatches' %}?status=execution_exception"
     class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm hover:border-red-300 hover:shadow transition-all cursor-pointer">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-8 h-8 bg-red-50 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <p class="text-sm font-medium text-slate-500">Exceptions</p>
    </div>
    <p class="text-3xl font-bold text-slate-900">{{ exception_dispatches }}</p>
  </a>
</div>
{% endblock %}
